appId: xyz.lilagents.win
productName: lil agents
directories:
  output: dist
  buildResources: assets

files:
  - out/**/*
  - package.json

extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*.webm"
      - "**/*.png"
      - "**/*.mp3"
      - "**/*.m4a"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  icon: assets/icon_512x512.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: KISHAN8888
  repo: lil-agents-win
